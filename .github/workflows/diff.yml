name: OpenAPI Breaking Change Detection

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  detect-breaking-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Post processing comment
        uses: edumserrano/find-create-or-update-comment@v2
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: '<!-- breaking-change-detector-comment -->'
          comment-author: 'github-actions[bot]'
          body: |
            <!-- breaking-change-detector-comment -->
            ## 🔄 Checking for Breaking API Changes...
            This comment will be updated when the check completes.
          edit-mode: replace

      # ---- Base branch ----

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: base

      - name: Install dependencies (base)
        working-directory: base
        run: npm ci

      - name: Generate OpenAPI spec (base)
        working-directory: base
        run: npx tsx scripts/generate-openapi.ts
        env:
          GENERATE_OPENAPI_SPEC: 'true'

      - name: Save base spec
        run: cp base/openapi.json /tmp/openapi-target.json

      # ---- PR branch ----

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          path: pr

      - name: Install dependencies (PR)
        working-directory: pr
        run: npm ci

      - name: Generate OpenAPI spec (PR)
        working-directory: pr
        run: npx tsx scripts/generate-openapi.ts
        env:
          GENERATE_OPENAPI_SPEC: 'true'

      - name: Save PR spec
        run: cp pr/openapi.json /tmp/openapi-pr.json

      # ---- Compare ----

      - name: Run oasdiff
        id: oasdiff
        uses: oasdiff/oasdiff-action/breaking@v0.0.43
        with:
          base: /tmp/openapi-target.json
          revision: /tmp/openapi-pr.json
          fail-on: ERR
          output-to-file: /tmp/oasdiff-result.txt
        continue-on-error: true

      - name: Read oasdiff result
        id: oasdiff_output
        run: |
          RESULT=$(cat /tmp/oasdiff-result.txt 2>/dev/null || echo "")
          EXIT_CODE=${{ steps.oasdiff.outcome == 'failure' && '1' || '0' }}
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$RESULT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build comment body
        id: comment
        run: |
          if [ "${{ steps.oasdiff_output.outputs.exit_code }}" != "0" ]; then
            OASDIFF_RESULT=$(cat <<'OASDIFF'
          ${{ steps.oasdiff_output.outputs.result }}
          OASDIFF
          )
            BODY=$(cat <<EOF
          ## ❌ Breaking API Changes Detected

          <pre>${OASDIFF_RESULT}</pre>
          > [!NOTE]
          > Add the `breaking-acknowledged` label to unblock.
          > @${{ github.event.pull_request.user.login }}
          EOF
          )
          else
            BODY=$(cat <<'EOF'
          ## ✅ No Breaking API Changes

          This PR introduces no breaking changes to the OpenAPI spec.
          EOF
          )
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Add breaking label
        if: steps.oasdiff_output.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            if (!labels.includes('breaking')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['breaking']
              });
            }

      - name: Remove breaking label
        if: steps.oasdiff_output.outputs.exit_code == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            if (labels.includes('breaking')) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'breaking'
              });
            }

      - name: Update PR with results
        uses: edumserrano/find-create-or-update-comment@v2
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: '<!-- breaking-change-detector-comment -->'
          comment-author: 'github-actions[bot]'
          body: |
            <!-- breaking-change-detector-comment -->
            ${{ steps.comment.outputs.body }}
          edit-mode: replace
     
      - name: Fail if unacknowledged breaking changes
        id: breaking_change_fail
        if: |
          steps.oasdiff_output.outputs.exit_code != '0' && !contains(github.event.pull_request.labels.*.name, 'breaking-acknowledged')
        run: |
          echo "intentional=true" >> $GITHUB_OUTPUT
          echo "Breaking changes detected and not acknowledged."
          exit 1

      - name: Update PR with failure notice
        if: |
          failure() && steps.breaking_change_fail.outputs.intentional != 'true'
        uses: edumserrano/find-create-or-update-comment@v2
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: '<!-- breaking-change-detector-comment -->'
          comment-author: 'github-actions[bot]'
          body: |
            <!-- breaking-change-detector-comment -->
            ## ⚠️ Breaking Change Detection Failed

            The workflow encountered an error and could not complete the analysis. This could be due to a build failure, a missing dependency, or an issue with the OpenAPI generation script.

            Please check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
          edit-mode: replace